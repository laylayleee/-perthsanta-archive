<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fic Archive | PerthSanta</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .container { max-width: 900px; margin: 40px auto; color: white; padding: 0 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .add-btn { background-color: #4da6ff; color: #000; padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .form-section { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 30px; display: none; }
        .form-section input, .form-section textarea { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; }
        .submit-btn { background-color: #00cc66; color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Fic Kartları Tasarımı */
        .fic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .fic-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        .fic-card h3 { margin-top: 0; color: #4da6ff; }
        .fic-card p { font-size: 14px; color: #aaa; margin-bottom: 15px; line-height: 1.5; }
        .fic-card .author { font-size: 12px; color: #777; margin-bottom: 10px; }
        .read-links a { display: inline-block; background: #222; color: white; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; margin-right: 5px; border: 1px solid #444; }
        .read-links a:hover { background: #4da6ff; color: black; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">✦ PERTHSANTA <br><span>ARCHIVE</span></div>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="fic.html" class="active">FIC ARCHIVE</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="page-header">
            <div>
                <h1 style="margin:0;">Fic Archive</h1>
                <p style="color:#aaa; margin-top:5px;">Explore stories written by the community.</p>
            </div>
            <button id="toggle-form-btn" class="add-btn">+ Add a Fic</button>
        </header>

        <section id="fic-form-section" class="form-section">
            <h2 style="margin-top:0;">Share a Fanfiction</h2>
            <form id="fic-form">
                <input type="text" id="fic-title" placeholder="Fic Title" required>
                <textarea id="fic-summary" rows="4" placeholder="Brief Plot / Summary" required></textarea>
                <input type="url" id="wattpad-link" placeholder="Wattpad Link (Optional)">
                <input type="url" id="ao3-link" placeholder="AO3 Link (Optional)">
                <button type="submit" class="submit-btn">Post to Archive</button>
                <p id="form-message" style="color: #ff4c4c; font-size: 14px; margin-top: 10px;"></p>
            </form>
        </section>

        <section class="fic-grid" id="fics-container">
            </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAAnSomEkoi6eeIhPyMuIh5UHzV6N_dz1o",
            authDomain: "perthsanta-archive.firebaseapp.com",
            projectId: "perthsanta-archive",
            storageBucket: "perthsanta-archive.firebasestorage.app",
            messagingSenderId: "263428342411",
            appId: "1:263428342411:web:1e23a5bdd8b8987b2cca8e",
            measurementId: "G-J0CCVHL7LC"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const formSection = document.getElementById('fic-form-section');
        const toggleBtn = document.getElementById('toggle-form-btn');
        const ficForm = document.getElementById('fic-form');
        const ficsContainer = document.getElementById('fics-container');
        const formMessage = document.getElementById('form-message');

        // Formu aç/kapat
        toggleBtn.addEventListener('click', () => {
            if (formSection.style.display === 'none' || formSection.style.display === '') {
                formSection.style.display = 'block';
                toggleBtn.textContent = '- Cancel';
            } else {
                formSection.style.display = 'none';
                toggleBtn.textContent = '+ Add a Fic';
            }
        });

        // Veritabanına Fic Kaydetme
        ficForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = auth.currentUser;
            if (!user) {
                formMessage.textContent = "You must be logged in to post a fic!";
                setTimeout(() => window.location.href = "login.html", 2000);
                return;
            }

            const title = document.getElementById('fic-title').value;
            const summary = document.getElementById('fic-summary').value;
            const wattpad = document.getElementById('wattpad-link').value;
            const ao3 = document.getElementById('ao3-link').value;

            try {
                await db.collection("fics").add({
                    title: title,
                    summary: summary,
                    wattpad: wattpad,
                    ao3: ao3,
                    authorName: user.displayName,
                    uid: user.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                ficForm.reset();
                formSection.style.display = 'none';
                toggleBtn.textContent = '+ Add a Fic';
            } catch (error) {
                console.error("Error adding fic: ", error);
            }
        });

        // Veritabanından Ficleri Çekip Ekranda Gösterme
        db.collection("fics").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            ficsContainer.innerHTML = '';
            snapshot.forEach((doc) => {
                const fic = doc.data();
                
                let linksHTML = '';
                if (fic.wattpad) linksHTML += `<a href="${fic.wattpad}" target="_blank">Read on Wattpad</a>`;
                if (fic.ao3) linksHTML += `<a href="${fic.ao3}" target="_blank">Read on AO3</a>`;

                const ficCard = `
                    <div class="fic-card">
                        <h3>${fic.title}</h3>
                        <div class="author">Posted by: ${fic.authorName}</div>
                        <p>${fic.summary}</p>
                        <div class="read-links">
                            ${linksHTML}
                        </div>
                    </div>
                `;
                ficsContainer.innerHTML += ficCard;
            });
        });
    </script>
</body>
</html>
