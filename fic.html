<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fic Archive | PerthSanta</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <header>
        <h1>Fic Archive</h1>
        <nav><a href="index.html">Back to Home</a></nav>
    </header>

    <main>
        <section id="add-fic-section">
            <h2>Add a New Fic</h2>
            <form id="fic-form">
                <input type="text" id="fic-title" placeholder="Fic Title" required>
                <textarea id="fic-summary" placeholder="Plot / Summary" required></textarea>
                <input type="url" id="ao3-link" placeholder="AO3 Link (Optional)">
                <input type="url" id="wattpad-link" placeholder="Wattpad Link (Optional)">
                <button type="submit">Submit Fic</button>
            </form>
        </section>

        <section id="fic-display-area">
            <h2>Community Fics</h2>
            <div id="fics-container">
                </div>
        </section>
    </main>
</body>
</html>
