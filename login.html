<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PerthSanta Archive</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .login-container { text-align: center; margin-top: 100px; color: white; }
        .btn-google { background-color: white; color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; }
        #user-info { margin-top: 30px; font-size: 18px; }
        .logout-btn { background-color: #ff4c4c; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">✦ PERTHSANTA <br><span>ARCHIVE</span></div>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <h1>Join the Archive</h1>
        <p>Connect with your Google account to start sharing.</p>
        
        <div id="login-section">
            <button id="google-login-btn" class="btn-google">
                Log in with Google
            </button>
        </div>

        <div id="user-info" style="display:none;">
            <p>Welcome, <span id="user-name" style="color: #4da6ff;"></span>!</p>
            <p>You are successfully logged in. You can now post fics and fanarts!</p>
            <button id="logout-btn" class="logout-btn">Logout</button>
            <br><br>
            <a href="index.html" style="color: white; text-decoration: underline;">Go back to Home</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAAnSomEkoi6eeIhPyMuIh5UHzV6N_dz1o",
            authDomain: "perthsanta-archive.firebaseapp.com",
            projectId: "perthsanta-archive",
            storageBucket: "perthsanta-archive.firebasestorage.app",
            messagingSenderId: "263428342411",
            appId: "1:263428342411:web:1e23a5bdd8b8987b2cca8e",
            measurementId: "G-J0CCVHL7LC"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const loginBtn = document.getElementById('google-login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loginSection = document.getElementById('login-section');
        const userInfoSection = document.getElementById('user-info');
        const userNameSpan = document.getElementById('user-name');

        // Oturum durumunu dinle
        auth.onAuthStateChanged(user => {
            if (user) {
                loginSection.style.display = 'none';
                userInfoSection.style.display = 'block';
                userNameSpan.textContent = user.displayName;
            } else {
                loginSection.style.display = 'block';
                userInfoSection.style.display = 'none';
            }
        });

        // Giriş Yap Butonu
        loginBtn.addEventListener('click', () => {
            auth.signInWithPopup(provider).catch(error => alert(error.message));
        });

        // Çıkış Yap Butonu
        logoutBtn.addEventListener('click', () => {
            auth.signOut();
        });
    </script>
</body>
</html>
