<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PerthSanta Archive</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div style="text-align: center; padding: 150px 20px;">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 20px;">Join the Archive</h1>
        <p style="color: var(--text-muted); margin-bottom: 40px;">Connect with your Google account to start sharing.</p>
        
        <button id="google-login-btn" class="btn-primary" style="cursor: pointer; display: inline-flex; align-items: center; gap: 10px; font-family: 'Inter', sans-serif;">
            <span style="font-weight: bold; font-size: 1.2rem;">G</span> Log in with Google
        </button>
        
        <br><br>
        <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; transition: color 0.3s ease;">← Back to Home</a>
    </div>

    <script type="module">
        // Firebase ana SDK'sı ve Kimlik Doğrulama (Auth) modülleri
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Senin gönderdiğin Firebase yapılandırması
        const firebaseConfig = {
            apiKey: "AIzaSyAAnSomEkoi6eeIhPyMuIh5UHzV6N_dz1o",
            authDomain: "perthsanta-archive.firebaseapp.com",
            projectId: "perthsanta-archive",
            storageBucket: "perthsanta-archive.firebasestorage.app",
            messagingSenderId: "263428342411",
            appId: "1:263428342411:web:1e23a5bdd8b8987b2cca8e",
            measurementId: "G-J0CCVHL7LC"
        };

        // Firebase'i ve Auth servisini başlat
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Butona tıklandığında çalışacak Google Giriş Penceresi
        document.getElementById('google-login-btn').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    // Giriş başarılı olursa ekranda isimle selamlama çıkar
                    alert("Welcome to the Archive, " + user.displayName + "!");
                    // Ana sayfaya geri yönlendir
                    window.location.href = "index.html"; 
                }).catch((error) => {
                    console.error("Giriş Hatası:", error.message);
                    alert("Giriş yapılamadı. Lütfen tekrar dene.");
                });
        });
    </script>

</body>
</html>
